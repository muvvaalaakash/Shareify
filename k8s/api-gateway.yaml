apiVersion: apps/v1
kind: Deployment
metadata:
  name: shareify-api-gateway
  labels:
    app: shareify-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shareify-api-gateway
  template:
    metadata:
      labels:
        app: shareify-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: mvnsakash/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: USER_SERVICE_URL
              value: "http://shareify-user-service:8000"
            - name: ITEM_SERVICE_URL
              value: "http://shareify-item-service:8000"
            - name: INVENTORY_SERVICE_URL
              value: "http://shareify-inventory-service:8000"
            - name: BOOKING_SERVICE_URL
              value: "http://shareify-booking-service:8000"
            - name: PAYMENT_SERVICE_URL
              value: "http://shareify-payment-service:8000"
            - name: REVIEW_SERVICE_URL
              value: "http://shareify-review-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: shareify-api-gateway
  labels:
    app: shareify-api-gateway
spec:
  type: NodePort
  selector:
    app: shareify-api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
