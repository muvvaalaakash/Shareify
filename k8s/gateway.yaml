apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shareify-gateway
  annotations:
    # Use NodePort for the gateway service
    gateway.kgateway.dev/service-type: NodePort
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
