apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    port: {{ .Values.gateway.port }}
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
