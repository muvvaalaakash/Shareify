apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shareify-routes
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  # 1. Register
  - matches:
    - path:
        type: PathPrefix
        value: /api/register
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /register
    backendRefs:
    - name: shareify-user-service
      port: 8000

  # 2. Login
  - matches:
    - path:
        type: PathPrefix
        value: /api/login
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /login
    backendRefs:
    - name: shareify-user-service
      port: 8000

  # 3. Profile
  - matches:
    - path:
        type: PathPrefix
        value: /api/profile
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /profile
    backendRefs:
    - name: shareify-user-service
      port: 8000

  # 4. Item Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/items
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /items
    backendRefs:
    - name: shareify-item-service
      port: 8000

  # 5. Booking Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/bookings
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /bookings
    backendRefs:
    - name: shareify-booking-service
      port: 8000

  # 6. Review Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/reviews
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /reviews
    backendRefs:
    - name: shareify-review-service
      port: 8000

  # 7. Payment Service (Added)
  - matches:
    - path:
        type: PathPrefix
        value: /api/payments
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /payments
    backendRefs:
    - name: shareify-payment-service
      port: 8000

  # 8. UI Route
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: shareify-frontend
      port: 80
