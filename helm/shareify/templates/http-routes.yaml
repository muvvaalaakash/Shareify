apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shareify-routes
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  # 1. Auth Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/register
    - path:
        type: PathPrefix
        value: /api/login
    - path:
        type: PathPrefix
        value: /api/profile
    backendRefs:
    - name: shareify-user-service
      port: 8000

  # 2. Item Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/items
    backendRefs:
    - name: shareify-item-service
      port: 8000

  # 3. Booking Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/bookings
    backendRefs:
    - name: shareify-booking-service
      port: 8000

  # 4. Review Service
  - matches:
    - path:
        type: PathPrefix
        value: /api/reviews
    backendRefs:
    - name: shareify-review-service
      port: 8000

  # 5. UI Route (Catch-all MUST be at the bottom)
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: shareify-frontend
      port: 80
