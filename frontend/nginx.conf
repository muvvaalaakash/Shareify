server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend services
    # We use the container names defined in docker-compose.yaml

    # User Service
    location /api/users/ {
        proxy_pass http://shareify-user-service:8000/;
    }
    location /api/register {
        proxy_pass http://shareify-user-service:8000/register;
    }
    location /api/login {
        proxy_pass http://shareify-user-service:8000/login;
    }
    location /api/profile {
        proxy_pass http://shareify-user-service:8000/profile;
    }

    # Item Service
    location /api/items {
        proxy_pass http://shareify-item-service:8000/items;
    }

    # Inventory Service
    location /api/inventory/ {
        proxy_pass http://shareify-inventory-service:8000/;
    }
    location /api/availability {
        proxy_pass http://shareify-inventory-service:8000/availability;
    }

    # Booking Service
    location /api/bookings {
        proxy_pass http://shareify-booking-service:8000/bookings;
    }

    # Payment Service
    location /api/payments {
        proxy_pass http://shareify-payment-service:8000/payments;
    }

    # Review Service
    location /api/reviews {
        proxy_pass http://shareify-review-service:8000/reviews;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
